asyncapi: 3.1.0
info:
  title: Zeus Session Protocol
  version: 1.0.0
  description: Socket.IO /session namespace for @zeus/player-ui collaborative deck sessions.
defaultContentType: application/json
channels:
  session:
    address: /session
    description: Player session namespace — global collaborative deck state
    messages:
      domain_deck_load:
        $ref: "#/components/messages/domain_deck_load"
      domain_playhead_set:
        $ref: "#/components/messages/domain_playhead_set"
      registro_select:
        $ref: "#/components/messages/registro_select"
      micropost_select:
        $ref: "#/components/messages/micropost_select"
      firehose_corpus:
        $ref: "#/components/messages/firehose_corpus"
      wikitext_cache:
        $ref: "#/components/messages/wikitext_cache"
      wikitext_poll:
        $ref: "#/components/messages/wikitext_poll"
      sync_toggle:
        $ref: "#/components/messages/sync_toggle"
      transport_play:
        $ref: "#/components/messages/transport_play"
      transport_pause:
        $ref: "#/components/messages/transport_pause"
      caso_set:
        $ref: "#/components/messages/caso_set"
      selection_cast:
        $ref: "#/components/messages/selection_cast"
      game_intent:
        $ref: "#/components/messages/game_intent"
      material_pin:
        $ref: "#/components/messages/material_pin"
      material_unpin:
        $ref: "#/components/messages/material_unpin"
      node_ontology_set:
        $ref: "#/components/messages/node_ontology_set"
      session_state:
        $ref: "#/components/messages/session_state"
      deck_resolved:
        $ref: "#/components/messages/deck_resolved"
      catalog_servers:
        $ref: "#/components/messages/catalog_servers"
      wikitext_cache-result:
        $ref: "#/components/messages/wikitext_cache-result"
      wikitext_poll-result:
        $ref: "#/components/messages/wikitext_poll-result"
      debug_stats:
        $ref: "#/components/messages/debug_stats"
      debug_resolve-timing:
        $ref: "#/components/messages/debug_resolve-timing"
      session_error:
        $ref: "#/components/messages/session_error"
operations:
  receive_domain_deck_load:
    action: receive
    channel:
      $ref: "#/channels/session"
    messages:
      - $ref: "#/channels/session/messages/domain_deck_load"
  receive_domain_playhead_set:
    action: receive
    channel:
      $ref: "#/channels/session"
    messages:
      - $ref: "#/channels/session/messages/domain_playhead_set"
  receive_registro_select:
    action: receive
    channel:
      $ref: "#/channels/session"
    messages:
      - $ref: "#/channels/session/messages/registro_select"
  receive_micropost_select:
    action: receive
    channel:
      $ref: "#/channels/session"
    messages:
      - $ref: "#/channels/session/messages/micropost_select"
  receive_firehose_corpus:
    action: receive
    channel:
      $ref: "#/channels/session"
    messages:
      - $ref: "#/channels/session/messages/firehose_corpus"
  receive_wikitext_cache:
    action: receive
    channel:
      $ref: "#/channels/session"
    messages:
      - $ref: "#/channels/session/messages/wikitext_cache"
    reply:
      channel:
        $ref: "#/channels/session"
      messages:
        - $ref: "#/channels/session/messages/wikitext_cache-result"
  receive_wikitext_poll:
    action: receive
    channel:
      $ref: "#/channels/session"
    messages:
      - $ref: "#/channels/session/messages/wikitext_poll"
    reply:
      channel:
        $ref: "#/channels/session"
      messages:
        - $ref: "#/channels/session/messages/wikitext_poll-result"
  receive_sync_toggle:
    action: receive
    channel:
      $ref: "#/channels/session"
    messages:
      - $ref: "#/channels/session/messages/sync_toggle"
  receive_transport_play:
    action: receive
    channel:
      $ref: "#/channels/session"
    messages:
      - $ref: "#/channels/session/messages/transport_play"
  receive_transport_pause:
    action: receive
    channel:
      $ref: "#/channels/session"
    messages:
      - $ref: "#/channels/session/messages/transport_pause"
  receive_caso_set:
    action: receive
    channel:
      $ref: "#/channels/session"
    messages:
      - $ref: "#/channels/session/messages/caso_set"
  receive_selection_cast:
    action: receive
    channel:
      $ref: "#/channels/session"
    messages:
      - $ref: "#/channels/session/messages/selection_cast"
  receive_game_intent:
    action: receive
    channel:
      $ref: "#/channels/session"
    messages:
      - $ref: "#/channels/session/messages/game_intent"
  receive_material_pin:
    action: receive
    channel:
      $ref: "#/channels/session"
    messages:
      - $ref: "#/channels/session/messages/material_pin"
  receive_material_unpin:
    action: receive
    channel:
      $ref: "#/channels/session"
    messages:
      - $ref: "#/channels/session/messages/material_unpin"
  receive_node_ontology_set:
    action: receive
    channel:
      $ref: "#/channels/session"
    messages:
      - $ref: "#/channels/session/messages/node_ontology_set"
  send_session_state:
    action: send
    channel:
      $ref: "#/channels/session"
    messages:
      - $ref: "#/channels/session/messages/session_state"
  send_deck_resolved:
    action: send
    channel:
      $ref: "#/channels/session"
    messages:
      - $ref: "#/channels/session/messages/deck_resolved"
  send_catalog_servers:
    action: send
    channel:
      $ref: "#/channels/session"
    messages:
      - $ref: "#/channels/session/messages/catalog_servers"
  send_wikitext_cache-result:
    action: send
    channel:
      $ref: "#/channels/session"
    messages:
      - $ref: "#/channels/session/messages/wikitext_cache-result"
  send_wikitext_poll-result:
    action: send
    channel:
      $ref: "#/channels/session"
    messages:
      - $ref: "#/channels/session/messages/wikitext_poll-result"
  send_debug_stats:
    action: send
    channel:
      $ref: "#/channels/session"
    messages:
      - $ref: "#/channels/session/messages/debug_stats"
  send_debug_resolve-timing:
    action: send
    channel:
      $ref: "#/channels/session"
    messages:
      - $ref: "#/channels/session/messages/debug_resolve-timing"
  send_session_error:
    action: send
    channel:
      $ref: "#/channels/session"
    messages:
      - $ref: "#/channels/session/messages/session_error"
components:
  messages:
    domain_deck_load:
      name: domain:deck:load
      title: domain:deck:load
      summary: Load a preset onto a deck slot and resolve all decks
      payload:
        $schema: https://json-schema.org/draft/2020-12/schema
        type: object
        properties:
          deckId:
            type: string
            enum:
              - A
              - B
              - C
          serverName:
            type: string
            minLength: 1
          presetId:
            type: string
        required:
          - deckId
          - serverName
        additionalProperties: false
    domain_playhead_set:
      name: domain:playhead:set
      title: domain:playhead:set
      summary: Set the historical playhead year and re-resolve decks
      payload:
        $schema: https://json-schema.org/draft/2020-12/schema
        type: object
        properties:
          year:
            type: number
        required:
          - year
        additionalProperties: false
    registro_select:
      name: registro:select
      title: registro:select
      summary: Select a registro oldid on deck B and resolve wikitext
      payload:
        $schema: https://json-schema.org/draft/2020-12/schema
        type: object
        properties:
          deckId:
            default: B
            type: string
            enum:
              - A
              - B
              - C
          oldid:
            type: number
          registro_id: {}
        required:
          - deckId
          - oldid
        additionalProperties: {}
    micropost_select:
      name: micropost:select
      title: micropost:select
      summary: Select a firehose micropost file on deck C
      payload:
        $schema: https://json-schema.org/draft/2020-12/schema
        type: object
        properties:
          deckId:
            default: C
            type: string
            enum:
              - A
              - B
              - C
          filePath:
            type: string
          corpus:
            type: string
          path:
            type: string
        required:
          - deckId
          - filePath
        additionalProperties: {}
    firehose_corpus:
      name: firehose:corpus
      title: firehose:corpus
      summary: Switch firehose corpus/path on deck C
      payload:
        $schema: https://json-schema.org/draft/2020-12/schema
        type: object
        properties:
          deckId:
            default: C
            type: string
            enum:
              - A
              - B
              - C
          corpus:
            anyOf:
              - type: string
                enum:
                  - candidate
                  - raw
                  - discarded
                  - labeled
              - type: string
          path:
            type: string
        required:
          - deckId
          - corpus
        additionalProperties: {}
    wikitext_cache:
      name: wikitext:cache
      title: wikitext:cache
      summary: Invoke cache_wikitext tool for an oldid
      payload:
        $schema: https://json-schema.org/draft/2020-12/schema
        type: object
        properties:
          deckId:
            default: B
            type: string
            enum:
              - A
              - B
              - C
          oldid:
            type: number
        required:
          - deckId
          - oldid
        additionalProperties: false
    wikitext_poll:
      name: wikitext:poll
      title: wikitext:poll
      summary: Poll wikitext cache status (deprecated — server-side wait preferred)
      payload:
        $schema: https://json-schema.org/draft/2020-12/schema
        type: object
        properties:
          deckId:
            default: B
            type: string
            enum:
              - A
              - B
              - C
          oldid:
            type: number
        required:
          - deckId
          - oldid
        additionalProperties: false
      deprecated: true
    sync_toggle:
      name: sync:toggle
      title: sync:toggle
      summary: Toggle deck sync mode
      payload:
        $schema: https://json-schema.org/draft/2020-12/schema
        type: object
        properties: {}
        additionalProperties: {}
    transport_play:
      name: transport:play
      title: transport:play
      summary: Start transport playback
      payload:
        $schema: https://json-schema.org/draft/2020-12/schema
        type: object
        properties: {}
        additionalProperties: {}
    transport_pause:
      name: transport:pause
      title: transport:pause
      summary: Pause transport playback
      payload:
        $schema: https://json-schema.org/draft/2020-12/schema
        type: object
        properties: {}
        additionalProperties: {}
    caso_set:
      name: caso:set
      title: caso:set
      summary: Set the active ALEPH caso id
      payload:
        $schema: https://json-schema.org/draft/2020-12/schema
        type: object
        properties:
          casoId:
            type: string
            minLength: 1
        required:
          - casoId
        additionalProperties: false
    selection_cast:
      name: selection:cast
      title: selection:cast
      summary: Cast an attributed selection (actor picks a target, e.g. a registro oldid)
      payload:
        $schema: https://json-schema.org/draft/2020-12/schema
        type: object
        properties:
          actorId:
            type: string
            minLength: 1
          kind:
            default: registro
            type: string
            minLength: 1
          deckId:
            default: B
            type: string
            minLength: 1
          nodeId:
            type: string
            minLength: 1
          targetId:
            anyOf:
              - type: number
              - type: string
          label:
            type: string
          meta:
            type: object
            properties: {}
            additionalProperties: {}
        required:
          - actorId
          - kind
          - deckId
        additionalProperties: {}
    game_intent:
      name: game:intent
      title: game:intent
      summary: Map-engine intent (sit/walk) — master validates via reducer; map reduction deferred until M2
      payload:
        $schema: https://json-schema.org/draft/2020-12/schema
        type: object
        properties:
          actorId:
            type: string
            minLength: 1
          intent:
            type: string
            enum:
              - sit
              - walk
          anchorId:
            type: string
          linkId:
            type: string
          direction:
            type: string
            enum:
              - a-to-b
              - b-to-a
        required:
          - actorId
          - intent
        additionalProperties: {}
    material_pin:
      name: material:pin
      title: material:pin
      summary: Pin transmedia material to a map node slot
      payload:
        $schema: https://json-schema.org/draft/2020-12/schema
        type: object
        properties:
          nodeId:
            type: string
            minLength: 1
          slot:
            type: string
            minLength: 1
          serverName:
            type: string
            minLength: 1
          presetId:
            type: string
        required:
          - nodeId
          - slot
          - serverName
        additionalProperties: false
    material_unpin:
      name: material:unpin
      title: material:unpin
      summary: Remove a pinned material from a map node slot
      payload:
        $schema: https://json-schema.org/draft/2020-12/schema
        type: object
        properties:
          nodeId:
            type: string
            minLength: 1
          slot:
            type: string
            minLength: 1
        required:
          - nodeId
          - slot
        additionalProperties: false
    node_ontology_set:
      name: node:ontology:set
      title: node:ontology:set
      summary: Merge ontology semantics onto a map node
      payload:
        $schema: https://json-schema.org/draft/2020-12/schema
        type: object
        properties:
          nodeId:
            type: string
            minLength: 1
          patch:
            type: object
            properties:
              registro:
                type: object
                properties:
                  oldid:
                    anyOf:
                      - type: number
                      - type: string
                  label:
                    type: string
                required:
                  - oldid
                additionalProperties: false
              micropost:
                type: object
                properties:
                  file:
                    type: string
                  corpus:
                    type: string
                required:
                  - file
                additionalProperties: false
              meta:
                type: object
                propertyNames:
                  type: string
                additionalProperties: {}
            additionalProperties: {}
        required:
          - nodeId
          - patch
        additionalProperties: false
    session_state:
      name: session:state
      title: session:state
      summary: Authoritative session snapshot from XState actor
      payload:
        $schema: https://json-schema.org/draft/2020-12/schema
        type: object
        properties: {}
        additionalProperties: {}
    deck_resolved:
      name: deck:resolved
      title: deck:resolved
      summary: Deck resolution payload after MCP fetch
      payload:
        $schema: https://json-schema.org/draft/2020-12/schema
        type: object
        properties: {}
        additionalProperties: {}
    catalog_servers:
      name: catalog:servers
      title: catalog:servers
      summary: MCP server catalog pushed on connect
      payload:
        $schema: https://json-schema.org/draft/2020-12/schema
        type: array
        items:
          type: object
          properties: {}
          additionalProperties: {}
    wikitext_cache-result:
      name: wikitext:cache-result
      title: wikitext:cache-result
      summary: Result of wikitext:cache tool invocation
      payload:
        $schema: https://json-schema.org/draft/2020-12/schema
        type: object
        properties: {}
        additionalProperties: {}
    wikitext_poll-result:
      name: wikitext:poll-result
      title: wikitext:poll-result
      summary: Result of wikitext cache poll
      payload:
        $schema: https://json-schema.org/draft/2020-12/schema
        type: object
        properties: {}
        additionalProperties: {}
      deprecated: true
    debug_stats:
      name: debug:stats
      title: debug:stats
      summary: Debug heartbeat with event counts and resolve timings
      payload:
        $schema: https://json-schema.org/draft/2020-12/schema
        type: object
        properties: {}
        additionalProperties: {}
    debug_resolve-timing:
      name: debug:resolve-timing
      title: debug:resolve-timing
      summary: Per-deck resolve timing in debug mode
      payload:
        $schema: https://json-schema.org/draft/2020-12/schema
        type: object
        properties: {}
        additionalProperties: {}
    session_error:
      name: session:error
      title: session:error
      summary: Validation or handler error unicast to the emitting client
      payload:
        $schema: https://json-schema.org/draft/2020-12/schema
        type: object
        properties:
          event:
            type: string
          code:
            type: string
            enum:
              - INVALID_PAYLOAD
              - HANDLER_ERROR
              - UNKNOWN_EVENT
              - DECK_NOT_LOADED
              - SERVER_DISCONNECTED
              - TOOL_NOT_ALLOWED
          message:
            type: string
          details: {}
        required:
          - event
          - code
          - message
        additionalProperties: false
