openapi: 3.1.0
info:
  title: Zeus Horse Preset Capability
  version: 0.1.0
  description: Control plane for curated preset offers over HORSE channels. Peers advertise a filtered MCP surface via horse.offer(presetOffer).
paths:
  /horse/presets:
    get:
      operationId: horse.presets.list
      summary: Preset summaries offered by this peer
      tags:
        - horse
        - presets
      responses:
        "200":
          description: Preset summaries offered by this peer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/horse.presets.list_200"
        "400":
          description: Client error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/horse.presets.list_error"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/horse.presets.list_error"
      x-mcp-resource: horse://presets
  /horse/presets/{presetId}:
    get:
      operationId: horse.preset.get
      summary: Full preset metadata and item manifest
      tags:
        - horse
        - presets
      responses:
        "200":
          description: Full preset metadata and item manifest
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/horse.preset.get_200"
        "400":
          description: Client error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/horse.presets.list_error"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/horse.presets.list_error"
      x-mcp-resource: preset://{presetId}
  /horse/presets/{presetId}/tools/{toolName}:
    post:
      operationId: horse.preset.callTool
      summary: Invoke a tool within preset scope (proxy upstream)
      tags:
        - horse
        - presets
      responses:
        "200":
          description: Invoke a tool within preset scope (proxy upstream)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/horse.preset.callTool_200"
        "400":
          description: Client error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/horse.presets.list_error"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/horse.presets.list_error"
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/horse.preset.callTool_body"
  /horse/presets/{presetId}/resources/{resourceName}:
    get:
      operationId: horse.preset.readResource
      summary: Read a resource within preset scope
      tags:
        - horse
        - presets
      responses:
        "200":
          description: Read a resource within preset scope
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/horse.preset.readResource_200"
        "400":
          description: Client error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/horse.presets.list_error"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/horse.presets.list_error"
  /horse/presets/{presetId}/prompt:
    get:
      operationId: horse.preset.getPrompt
      summary: Get the preset system prompt
      tags:
        - horse
        - presets
      responses:
        "200":
          description: Get the preset system prompt
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/horse.preset.getPrompt_200"
        "400":
          description: Client error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/horse.presets.list_error"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/horse.presets.list_error"
components:
  schemas:
    horse.presets.list_200:
      $schema: https://json-schema.org/draft/2020-12/schema
      type: object
      properties:
        presets:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              name:
                type: string
              category:
                type: string
              description:
                type: string
              itemsCount:
                type: number
            required:
              - id
              - name
              - itemsCount
            additionalProperties: false
      required:
        - presets
      additionalProperties: false
    horse.presets.list_error:
      $schema: https://json-schema.org/draft/2020-12/schema
      type: object
      properties:
        error:
          type: string
        success:
          type: boolean
          const: false
        code:
          type: string
      required:
        - error
      additionalProperties: false
    horse.preset.get_200:
      $schema: https://json-schema.org/draft/2020-12/schema
      type: object
      properties:
        preset:
          type: object
          properties:
            id:
              type: string
            name:
              type: string
            category:
              type: string
            description:
              type: string
            prompt:
              type: string
            items:
              type: array
              items: {}
            itemsCount:
              type: number
          required:
            - id
            - name
            - items
            - itemsCount
          additionalProperties: false
      required:
        - preset
      additionalProperties: false
    horse.preset.callTool_body:
      $schema: https://json-schema.org/draft/2020-12/schema
      type: object
      properties:
        arguments:
          type: object
          propertyNames:
            type: string
          additionalProperties: {}
      additionalProperties: false
    __schema0: {}
    horse.preset.callTool_200:
      $schema: https://json-schema.org/draft/2020-12/schema
      type: object
      properties: {}
      additionalProperties:
        $ref: "#/components/schemas/__schema0"
      description: MCP tool call result
    horse.preset.readResource_200:
      $schema: https://json-schema.org/draft/2020-12/schema
      type: object
      properties: {}
      additionalProperties:
        $ref: "#/components/schemas/__schema0"
      description: MCP resource read result
    horse.preset.getPrompt_200:
      $schema: https://json-schema.org/draft/2020-12/schema
      type: object
      properties: {}
      additionalProperties:
        $ref: "#/components/schemas/__schema0"
      description: MCP prompt get result
