      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/mcp.set_body"
  /api/mcp/presets:
    get:
      operationId: mcp.presets
      summary: List preset summaries
      tags:
        - mcp
        - presets
      responses:
        "200":
          description: List preset summaries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/mcp.presets_200"
        "400":
          description: Client error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/mcp.list_error"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/mcp.list_error"
      x-status: sdk-compat
  /api/mcp/preset/{name}:
    get:
      operationId: mcp.preset-by-name
      summary: Get full preset by name
      tags:
        - mcp
        - presets
      responses:
        "200":
          description: Get full preset by name
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/mcp.preset-by-name_200"
        "400":
          description: Client error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/mcp.list_error"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/mcp.list_error"
      x-status: sdk-compat
  /api/mcp/preset/{id}:
    delete:
      operationId: mcp.preset-delete
      summary: Delete preset by id
      tags:
        - mcp
        - presets
      responses:
        "200":
          description: Delete preset by id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/mcp.preset-delete_200"
        "400":
          description: Client error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/mcp.list_error"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/mcp.list_error"
      x-status: sdk-compat
components:
  schemas:
    health_200:
      $schema: https://json-schema.org/draft/2020-12/schema
      type: object
      properties:
        status:
          type: string
          const: ok
        service:
          type: string
        timestamp:
          type: string
      required:
        - status
      additionalProperties: false
    health_error:
      $schema: https://json-schema.org/draft/2020-12/schema
      type: object
      properties:
        error:
          type: string
        success:
          type: boolean
          const: false
        code:
          type: string
      required:
        - error
      additionalProperties: false
    theme.config_200:
      $schema: https://json-schema.org/draft/2020-12/schema
      type: object
      properties:
        theme: {}
      required:
        - theme
      additionalProperties: false
    theme.list_200:
      $schema: https://json-schema.org/draft/2020-12/schema
      type: object
      properties:
        themes:
          type: array
          items: {}
        current:
          type: string
      required:
        - themes
        - current
      additionalProperties: false
    theme.current_200:
      $schema: https://json-schema.org/draft/2020-12/schema
      type: object
      properties:
        current:
          type: string
      required:
        - current
      additionalProperties: false
    theme.switch_body:
      $schema: https://json-schema.org/draft/2020-12/schema
      type: object
      properties:
        theme:
          type: string
          minLength: 1
      required:
        - theme
      additionalProperties: false
    theme.switch_200:
      $schema: https://json-schema.org/draft/2020-12/schema
      type: object
      properties:
        success:
          type: boolean
        current:
          type: string
        previous:
          type: string
      additionalProperties: false
    api.health_error:
      $schema: https://json-schema.org/draft/2020-12/schema
      type: object
      properties:
        success:
          type: boolean
          const: false
        error:
          type: string
        message:
          type: string
        details: {}
      required:
        - success
        - error
      additionalProperties: false
    api.settings.get_200:
      $schema: https://json-schema.org/draft/2020-12/schema
      type: object
      properties: {}
      additionalProperties: {}
    api.settings.put_params:
      $schema: https://json-schema.org/draft/2020-12/schema
      type: object
      properties:
        section:
          type: string
      required:
        - section
      additionalProperties: false
    api.settings.put_body:
      $schema: https://json-schema.org/draft/2020-12/schema
      type: object
      properties: {}
      additionalProperties: {}
    api.settings.put_200:
      $schema: https://json-schema.org/draft/2020-12/schema
      type: object
      properties:
        success:
          type: boolean
          const: true
      required:
        - success
      additionalProperties: {}
    api.presets.list_200:
      $schema: https://json-schema.org/draft/2020-12/schema
      type: object
      properties:
        success:
          type: boolean
          const: true
        presets:
          type: array
          items: {}
        pagination: {}
      required:
        - success
        - presets
      additionalProperties: false
    api.presets.create_body:
      $schema: https://json-schema.org/draft/2020-12/schema
      type: object
      properties:
        name:
          type: string
      required:
        - name
      additionalProperties: {}
    api.presets.create_201:
      $schema: https://json-schema.org/draft/2020-12/schema
      type: object
      properties:
        success:
          type: boolean
          const: true
        preset: {}
