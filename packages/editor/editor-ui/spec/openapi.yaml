openapi: 3.1.0
info:
  title: Zeus Editor UI API
  version: 0.1.0
  description: REST API for @zeus/editor-ui world editor (gamemap/release) and cloak/MCP catalog.
servers:
  - url: http://localhost:3012
    description: editor-ui default
paths:
  /health:
    get:
      operationId: health
      summary: Service health
      tags:
        - system
      responses:
        "200":
          description: Service health
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/health_200"
        "400":
          description: Client error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/health_error"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/health_error"
  /api/config:
    get:
      operationId: theme.config
      summary: Public theme slice of app config
      tags:
        - theme
      responses:
        "200":
          description: Public theme slice of app config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/theme.config_200"
        "400":
          description: Client error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/health_error"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/health_error"
  /api/themes:
    get:
      operationId: theme.list
      summary: List available themes
      tags:
        - theme
      responses:
        "200":
          description: List available themes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/theme.list_200"
        "400":
          description: Client error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/health_error"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/health_error"
  /api/theme:
    get:
      operationId: theme.current
      summary: Current theme name
      tags:
        - theme
      responses:
        "200":
          description: Current theme name
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/theme.current_200"
        "400":
          description: Client error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/health_error"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/health_error"
  /api/theme/switch:
    post:
      operationId: theme.switch
      summary: Switch active theme
      tags:
        - theme
      responses:
        "200":
          description: Switch active theme
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/theme.switch_200"
        "400":
          description: Client error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/health_error"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/health_error"
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/theme.switch_body"
  /api/health:
    get:
      operationId: api.health
      summary: API health
      tags:
        - system
      responses:
        "200":
          description: API health
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/health_200"
        "400":
          description: Client error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.health_error"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.health_error"
  /api/settings:
    get:
      operationId: api.settings.get
      summary: Read config sections
      tags:
        - settings
      responses:
        "200":
          description: Read config sections
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.settings.get_200"
        "400":
          description: Client error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.health_error"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.health_error"
  /api/settings/{section}:
    put:
      operationId: api.settings.put
      summary: Update config section
      tags:
        - settings
      responses:
        "200":
          description: Update config section
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.settings.put_200"
        "400":
          description: Client error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.health_error"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.health_error"
      x-status: canonical
      parameters:
        - name: section
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/api.settings.put_body"
  /api/presets:
    get:
      operationId: api.presets.list
      summary: List/search presets (canonical CRUD)
      tags:
        - presets
      responses:
        "200":
          description: List/search presets (canonical CRUD)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.presets.list_200"
        "400":
          description: Client error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.health_error"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.health_error"
      x-status: canonical
    post:
      operationId: api.presets.create
      summary: Create preset
      tags:
        - presets
      responses:
        "201":
          description: Create preset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.presets.create_201"
        "400":
          description: Client error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.health_error"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.health_error"
      x-status: canonical
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/api.presets.create_body"
  /api/presets/{id}:
    get:
      operationId: api.presets.get
      summary: Preset detail
      tags:
        - presets
      responses:
        "200":
          description: Preset detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.presets.create_201"
        "400":
          description: Client error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.health_error"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.health_error"
      x-status: canonical
    put:
      operationId: api.presets.update
      summary: Update preset
      tags:
        - presets
      responses:
        "200":
          description: Update preset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.presets.create_201"
        "400":
          description: Client error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.health_error"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.health_error"
      x-status: canonical
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/api.presets.update_body"
    delete:
      operationId: api.presets.delete
      summary: Delete cloak/preset
      tags:
        - presets
      responses:
        "200":
          description: Delete cloak/preset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.settings.put_200"
        "400":
          description: Client error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.health_error"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.health_error"
      x-status: canonical
  /api/presets/{id}/download:
    get:
      operationId: api.presets.download
      summary: Download preset ZIP bundle
      tags:
        - presets
      responses:
        "200":
          description: Download preset ZIP bundle
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.presets.download_200"
        "400":
          description: Client error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.health_error"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.health_error"
      x-status: canonical
  /api/world/materials:
    get:
      operationId: api.world.materials
      summary: List selectable world materials (scenes, lines, games, cloaks)
      tags:
        - world
      responses:
        "200":
          description: List selectable world materials (scenes, lines, games, cloaks)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.world.materials_200"
        "400":
          description: Client error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.health_error"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.health_error"
      x-status: canonical
  /api/world/draft:
    get:
      operationId: api.world.draft.get
      summary: Read world draft
      tags:
        - world
      responses:
        "200":
          description: Read world draft
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.world.draft.get_200"
        "400":
          description: Client error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.health_error"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.health_error"
      x-status: canonical
    put:
      operationId: api.world.draft.put
      summary: Update world draft
      tags:
        - world
      responses:
        "200":
          description: Update world draft
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.world.draft.put_200"
        "400":
          description: Client error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.health_error"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.health_error"
      x-status: canonical
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/api.world.draft.put_body"
  /api/world/draft/reset:
    post:
      operationId: api.world.draft.reset
      summary: Reset world draft to defaults
      tags:
        - world
      responses:
        "200":
          description: Reset world draft to defaults
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.world.draft.reset_200"
        "400":
          description: Client error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.health_error"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.health_error"
      x-status: canonical
  /api/world/release:
    post:
      operationId: api.world.release
      summary: Materialize startpack + run Notario (U62)
      tags:
        - world
      responses:
        "200":
          description: Materialize startpack + run Notario (U62)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.world.release_200"
        "400":
          description: Client error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.health_error"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.health_error"
      x-status: canonical
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/api.world.release_body"
  /api/mcp/refresh:
    post:
      operationId: api.mcp.refresh
      summary: Re-probe MCP discovery
      tags:
        - mcp
      responses:
        "200":
          description: Re-probe MCP discovery
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.settings.put_200"
        "400":
          description: Client error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.health_error"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.health_error"
  /api/mcp/servers:
    get:
      operationId: api.mcp.servers
      summary: List MCP servers
      tags:
        - mcp
      responses:
        "200":
          description: List MCP servers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.mcp.servers_200"
        "400":
          description: Client error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.health_error"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.health_error"
  /api/mcp/servers/{id}/content:
    get:
      operationId: api.mcp.servers.content
      summary: Server tools/resources/prompts aggregate
      tags:
        - mcp
      responses:
        "200":
          description: Server tools/resources/prompts aggregate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.mcp.servers.content_200"
        "400":
          description: Client error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.health_error"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.health_error"
  /api/mcp/servers/{id}/tools:
    get:
      operationId: api.mcp.servers.tools
      summary: Server tools (search/category)
      tags:
        - mcp
      responses:
        "200":
          description: Server tools (search/category)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.mcp.servers.content_200"
        "400":
          description: Client error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.health_error"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.health_error"
  /api/mcp/servers/{id}/resources:
    get:
      operationId: api.mcp.servers.resources
      summary: Server resources (search/type)
      tags:
        - mcp
      responses:
        "200":
          description: Server resources (search/type)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.mcp.servers.content_200"
        "400":
          description: Client error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.health_error"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.health_error"
  /api/mcp/servers/{id}/prompts:
    get:
      operationId: api.mcp.servers.prompts
      summary: Server prompts (search/category)
      tags:
        - mcp
      responses:
        "200":
          description: Server prompts (search/category)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.mcp.servers.content_200"
        "400":
          description: Client error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.health_error"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.health_error"
  /api/mcp/servers/{id}/resource-templates:
    get:
      operationId: api.mcp.servers.templates
      summary: Server resource templates
      tags:
        - mcp
      responses:
        "200":
          description: Server resource templates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.mcp.servers.content_200"
        "400":
          description: Client error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.health_error"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.health_error"
  /api/mcp/list:
    get:
      operationId: mcp.list
      summary: Full MCP server catalog
      tags:
        - mcp
        - presets
      responses:
        "200":
          description: Full MCP server catalog
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/mcp.list_200"
        "400":
          description: Client error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/mcp.list_error"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/mcp.list_error"
      x-status: sdk-compat
  /api/mcp/set:
    post:
      operationId: mcp.set
      summary: Create or update preset by name
      tags:
        - mcp
        - presets
      responses:
        "200":
          description: Create or update preset by name
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/mcp.set_200"
        "400":
          description: Client error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/mcp.list_error"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/mcp.list_error"
