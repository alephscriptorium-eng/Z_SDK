# CI monorepo Z_SDK (WP-U03 / D-12 / ARQUITECTURA §5 paso 1).
# Publish/tag/GitHub Release: .github/workflows/release.yml (WP-U53), solo en main
# y solo tras quality+test verdes + secrets NPM_USERNAME/NPM_PASSWORD (_password).
name: CI

on:
  push:
    branches:
      - main
      - 'wp/**'
    # WP-U104 / D-22: bookkeeping plan + markdown no dispara matriz ~31 jobs.
    # `**.md` = todos los .md del repo (docs GHA: Pattern matching).
    paths-ignore:
      - 'plan/**'
      - '**.md'
  pull_request:
    paths-ignore:
      - 'plan/**'
      - '**.md'

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: lint + gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Gates (PRACTICAS §5)
        run: npm run gates
      - name: Gate unit tests
        run: npm run test:gates

  test:
    name: test ${{ matrix.workspace }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        workspace:
          - '@zeus/presets-sdk'
          - '@zeus/firehose-core'
          - '@zeus/room-client-browser'
          - '@zeus/http-contract'
          - '@zeus/rooms'
          - '@zeus/protocol'
          - '@zeus/authority-kit'
          - '@zeus/game-engine'
          - '@zeus/operator-bridge'
          - '@zeus/ui-3d-kit'
          - '@zeus/ui-kit'
          - '@zeus/app-shell'
          - '@zeus/test-utils'
          - '@zeus/solar-system'
          - '@zeus/linea-system'
          - '@zeus/linea-firehose'
          - '@zeus/console-monitor'
          - '@zeus/socket-server'
          - '@zeus/cache-browser'
          - '@zeus/firehose-browser'
          - '@zeus/editor-ui'
          - '@zeus/player-ui'
          - '@zeus/player-3d-ui'
          - '@zeus/3d-monitor'
          - '@zeus/ping-pong-bots'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install
        run: npm ci
      - name: Test workspace
        run: npm test -w "${{ matrix.workspace }}"

  # WP-U158 — consumidor TS tipado desde registry real (no tarball).
  # Skip limpio (exit 0 · ⏳) si el registry no responde — patrón U122.
  smoke-ts-registry:
    name: smoke TS registry (U158)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Smoke TypeScript consumer from @zeus registry
        run: npm run smoke:ts-registry
        env:
          ZEUS_SMOKE_CLEANUP: '1'
