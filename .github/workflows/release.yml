# Release — changesets → bump → publish (WP-U53 / D-12 / ARQUITECTURA §5 paso 3).
# Condición dura: quality + test verdes. Publish solo con basic-auth durable
# (WP-U122 / D-24 (a): user + `_password` base64 — no JWT de 7d).
# Ops (post-merge): secrets `NPM_USERNAME` + `NPM_PASSWORD`.
#   `NPM_PASSWORD` = valor de `_password` del `.npmrc.example` del registry /
#   `npm login` (password ya en base64; sin comillas). Sin secret → skip ⏳.
name: Release

on:
  push:
    branches:
      - main
    # WP-U104 / D-22: solo changesets o código de paquetes (no cada push a main).
    # Conserva quality+test+secrets más abajo; este filtro solo acota el trigger.
    paths:
      - '.changeset/**'
      - 'packages/**'

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  quality:
    name: lint + gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Gates (PRACTICAS §5)
        run: npm run gates
      - name: Gate unit tests
        run: npm run test:gates

  test:
    name: test ${{ matrix.workspace }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        workspace:
          - '@zeus/presets-sdk'
          - '@zeus/firehose-core'
          - '@zeus/room-client-browser'
          - '@zeus/http-contract'
          - '@zeus/rooms'
          - '@zeus/protocol'
          - '@zeus/authority-kit'
          - '@zeus/game-engine'
          - '@zeus/operator-bridge'
          - '@zeus/ui-3d-kit'
          - '@zeus/ui-kit'
          - '@zeus/app-shell'
          - '@zeus/test-utils'
          - '@zeus/solar-system'
          - '@zeus/linea-system'
          - '@zeus/linea-firehose'
          - '@zeus/console-monitor'
          - '@zeus/socket-server'
          - '@zeus/cache-browser'
          - '@zeus/firehose-browser'
          - '@zeus/editor-ui'
          - '@zeus/player-ui'
          - '@zeus/player-3d-ui'
          - '@zeus/3d-monitor'
          - '@zeus/ping-pong-bots'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install
        run: npm ci
      - name: Test workspace
        run: npm test -w "${{ matrix.workspace }}"

  release:
    name: changesets release
    needs: [quality, test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # Sin registry-url/scope aquí: evita que setup-node inyecte bearer JWT
      # como única vía de auth. El `.npmrc` del repo ya enruta `@zeus` /
      # `@alephscript` al registry propio; el paso siguiente escribe `_password`.
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install
        run: npm ci
      - name: Detect publish credentials
        id: creds
        env:
          NPM_USERNAME: ${{ secrets.NPM_USERNAME }}
          NPM_PASSWORD: ${{ secrets.NPM_PASSWORD }}
        run: |
          if [ -n "${NPM_USERNAME}" ] && [ -n "${NPM_PASSWORD}" ]; then
            echo "has_npm=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_npm=false" >> "$GITHUB_OUTPUT"
            echo "::notice::NPM_USERNAME/NPM_PASSWORD absent — publish/tag/GitHub Release skipped (⏳)"
          fi
      - name: Configure registry basic-auth (_password)
        if: steps.creds.outputs.has_npm == 'true'
        env:
          NPM_USERNAME: ${{ secrets.NPM_USERNAME }}
          NPM_PASSWORD: ${{ secrets.NPM_PASSWORD }}
        run: |
          # Patrón Verdaccio / `.npmrc.example` del registry (D-24 a):
          # //host/:_password=<base64> + username (no bearer JWT de 7d)
          HOST='npm.scriptorium.escrivivir.co'
          {
            echo "//${HOST}/:_password=${NPM_PASSWORD}"
            echo "//${HOST}/:username=${NPM_USERNAME}"
            echo "//${HOST}/:email=ci@scriptorium.escrivivir.co"
            echo "//${HOST}/:always-auth=true"
          } >> .npmrc
      - name: Create Release PR or publish
        if: steps.creds.outputs.has_npm == 'true'
        uses: changesets/action@v1
        with:
          version: npm run version-packages
          publish: npm run release:publish
          title: 'chore(release): version packages'
          commit: 'chore(release): version packages'
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Skip publish without credentials
        if: steps.creds.outputs.has_npm != 'true'
        run: |
          echo "Pipeline verde (quality+test) OK; publish blocked by missing NPM_USERNAME/NPM_PASSWORD."
          echo "Local CA path: npm run release:changeset-dry"
          echo "Auth model (D-24 a): basic-auth _password — ops loads secrets post-merge."
          npx changeset status || true
